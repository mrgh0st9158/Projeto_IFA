<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title></title>
  <link rel="preconnect" href="https://googleapis.com" />
  <link rel="preconnect" href="https://gstatic.com" crossorigin />
  <link href="https://googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="header">
    <div class="logo"></div>

    <div class="header-text">
      <h1>Formulário IFA</h1>
      <p>Turma 212</p>
    </div>
  </header>

  <main class="container">

    <section id="section_form" class="form-card">
      <h2>Formulário</h2>

      <form id="eventForm" action="https://api.sheetmonkey.io/form/w4yeALRr6RStbfDkovP54b" method="post">
        <div class="form-group">
          <label>Nome e Sobrenome</label>
          <input type="text" id="nome" name="Nome" required />
        </div>

        <div class="form-group">
          <label>Turma</label>
          <input type="text" id="cargo" name="Turma" required />
        </div>

        <div class="form-group">
          <label>Região onde mora</label>
          <input type="text" id="setor" name="Região" required />
        </div>

        <div class="form-group">
          <label>Método de transporte</label>
          <select id="contato" name="Transporte" required>
            <option value="">Selecione</option>
            <option>Ônibus</option>
            <option>Moto</option>
            <option>Carro</option>
            <option>Bicicleta</option>
            <option>A pé</option>
          </select>
        </div>

        <div class="form-group">
          <label>Quanto tempo em média você demora para chegar no Instituto</label>
          <select id="curso" name="Tempo" required>
            <option value="">Selecione</option>
            <option>Menos de 10 min</option>
            <option>10 a 30 min</option>
            <option>30 a 40 min</option>
            <option>40 a 60 min</option>
            <option>1 a 2 horas</option>
            <option>Mais de 2 horas</option>
          </select>
        </div>

        <button type="submit">Finalizar Inscrição</button>
      </form>
    </section>
  
    <section id="section_final" class="form-card esconder_elemento">
      <h2>Resposta enviada com sucesso, Obrigado.</h2>
    </section>


  </main>
  
  <footer class="footer">
    <p>
      Grupo: Athos, Beatriz, Larissa, Leticia, Yasmyn
    </p>
    <p>
      Email para contato: athosclpimenta@gmail.com
    </p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
